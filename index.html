  .msg-user .msg-bubble{background: var(--secondary-blue); color:white; border-radius:12px 12px 0 12px;}
  .msg-ai .msg-bubble{background:#e0e7ff; color:#1f2937; border-radius:12px 12px 12px 0;}
  .avatar{width:30px; height:30px; border-radius:50%;}

  .dark-mode .msg-ai .msg-bubble{background:#374151; color:white;}

<script>
const chatHeader = document.getElementById('sit-chat-header');
const chatBody = document.getElementById('sit-chat-body');
const chatMessages = document.getElementById('sit-chat-messages');
const chatInput = document.getElementById('sit-chat-input');
const chatSend = document.getElementById('sit-chat-send');
const quickBtns = document.querySelectorAll('.quick-btn');
const themeBtn = document.getElementById('sit-chat-toggle-theme');
const chatbotContainer = document.getElementById('sit-chatbot');

// Toggle chat open/close
chatHeader.addEventListener('click', () => {
  chatBody.style.display = chatBody.style.display==='block'?'none':'block';
});

// Toggle dark/light theme
themeBtn.addEventListener('click', ()=>{
  chatbotContainer.classList.toggle('dark-mode');
  themeBtn.textContent = chatbotContainer.classList.contains('dark-mode')?'☀️':'🌙';
});

// Predefined AI responses
function getAIResponse(msg){
  const m = msg.toLowerCase();
  if(m.includes('about')) return "SIT is Seshasayee Institute of Technology, Trichy, established in 1952. It offers quality technical education.";
  if(m.includes('admission')) return "Admission: Check our Admission page for courses, fees, eligibility, and application process.";
  if(m.includes('department')) return "Departments: CSE, ICE, Mechanical, Civil, EEE, Paper Tech, Chemical Engineering.";
  if(m.includes('placement')) return "Placements: SIT has strong industry connections and excellent placement records.";
  if(m.includes('contact')) return "Contact: Thanjore Main Road, Ariyamangalam, Trichy-620010, Tamil Nadu, India. Phone: +91-XXXX-XXXXXX";
  return "Sorry, I couldn't understand. You can try one of the quick buttons.";
}

// Add message to chat
function addMessage(sender, text){
  const msgDiv = document.createElement('div');
  msgDiv.className = sender==='user'?'msg-user':'msg-ai';
  msgDiv.innerHTML = `${sender==='ai'?'<img class="avatar" src="img/sit.jpeg">':''}<div class="msg-bubble">${text}</div>${sender==='user'?'<img class="avatar" src="img/FOUNDER.jpeg">':''}`;
  chatMessages.appendChild(msgDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Send message function
function sendMessage(message){
  if(!message) return;
  addMessage('user', message);
  addMessage('ai', 'Typing...');
  setTimeout(()=>{
    chatMessages.lastChild.remove(); // remove 'Typing...'
    addMessage('ai', getAIResponse(message));
  },800);
}

// Send button & Enter key
chatSend.addEventListener('click', ()=>{
  sendMessage(chatInput.value);
  chatInput.value='';
});
chatInput.addEventListener('keypress',(e)=>{
  if(e.key==='Enter'){
    sendMessage(chatInput.value);
    chatInput.value='';
  }
});

// Quick buttons
quickBtns.forEach(btn=>{btn.addEventListener('click',()=>sendMessage(btn.dataset.msg));});
</script>
